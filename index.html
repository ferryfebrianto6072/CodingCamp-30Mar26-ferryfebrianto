<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expense Tracker</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <h1>Expense Tracker</h1>
    <button id="theme-toggle" aria-label="Toggle dark mode">🌙</button>
  </header>

  <section id="balance">
    <h2>Total Balance</h2>
    <p id="balance-amount">$0.00</p>
  </section>

  <section id="chart">
    <canvas id="expense-chart"></canvas>
    <p id="chart-empty">No transactions yet. Add one to see your spending chart.</p>
  </section>

  <section id="form">
    <h2>Add Transaction</h2>
    <form id="transaction-form">
      <label for="item-name">Item Name</label>
      <input type="text" id="item-name" name="item-name" placeholder="e.g. Lunch">

      <label for="amount">Amount</label>
      <input type="number" id="amount" name="amount" placeholder="e.g. 12.50" min="0" step="any">

      <label for="category">Category</label>
      <select id="category" name="category"></select>
      <div id="new-category-row" style="display:none;">
        <input type="text" id="new-category-input" placeholder="New category name">
        <button type="button" id="new-category-confirm">Add</button>
        <button type="button" id="new-category-cancel">Cancel</button>
      </div>

      <button type="submit">Add Transaction</button>
      <div id="form-errors"></div>
    </form>
  </section>

  <section id="list">
    <div id="list-header">
      <h2>Transactions</h2>
      <select id="category-filter"></select>
    </div>
  </section>

  <script src="chart.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
